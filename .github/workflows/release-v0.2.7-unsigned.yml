name: Publish v0.2.7 unsigned

on:
  workflow_dispatch:

jobs:
  publish-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v0.2.7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install

      - name: Disable updater signing for this release
        shell: pwsh
        run: |
          $configPath = 'src-tauri/tauri.conf.json'
          $config = Get-Content -Raw $configPath | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $false
          $config.plugins.PSObject.Properties.Remove('updater')
          $config | ConvertTo-Json -Depth 100 | Set-Content -NoNewline -Encoding utf8 $configPath

      - name: Build and publish unsigned Windows installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.2.7
          releaseName: v0.2.7
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target x86_64-pc-windows-msvc
